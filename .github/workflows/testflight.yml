name: TestFlight Deploy

# Manual trigger only — requires Apple credentials in secrets
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increments if empty)'
        required: false
        type: string

# ┌──────────────────────────────────────────────────────────┐
# │ REQUIRED SECRETS (add in repo Settings → Secrets):       │
# │                                                          │
# │ APP_STORE_CONNECT_API_KEY_ID    - Key ID from ASC        │
# │ APP_STORE_CONNECT_ISSUER_ID     - Issuer ID from ASC     │
# │ APP_STORE_CONNECT_API_KEY_P8    - .p8 key file contents  │
# │ APPLE_CERTIFICATE_P12           - Base64 encoded .p12    │
# │ APPLE_CERTIFICATE_PASSWORD      - .p12 password          │
# │ APPLE_PROVISIONING_PROFILE      - Base64 encoded .mobileprovision │
# │ APPLE_TEAM_ID                   - Your team ID           │
# │ APPLE_BUNDLE_ID                 - e.g. com.yourco.freeflow │
# └──────────────────────────────────────────────────────────┘

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install Apple certificate & provisioning profile
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_P12" | base64 --decode > $CERT_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Generate Xcode project
        run: |
          # Create a minimal Xcode project for the app
          cat > project.yml << 'YAML'
          name: FreeFlow
          options:
            bundleIdPrefix: ${{ secrets.APPLE_BUNDLE_ID || 'com.freeflow' }}
            deploymentTarget:
              iOS: "16.0"
          targets:
            FreeFlow:
              type: application
              platform: iOS
              sources:
                - path: FreeFlow/Sources
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.APPLE_BUNDLE_ID || 'com.freeflow.app' }}
                  DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
                  CODE_SIGN_STYLE: Manual
                  INFOPLIST_KEY_CFBundleDisplayName: FreeFlow
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "${{ inputs.build_number || github.run_number }}"
          YAML

          # Install xcodegen if needed
          brew install xcodegen 2>/dev/null || true
          xcodegen generate

      - name: Build archive
        run: |
          xcodebuild archive \
            -project FreeFlow.xcodeproj \
            -scheme FreeFlow \
            -archivePath build/FreeFlow.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/FreeFlow.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          # Write API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Upload via xcrun
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/FreeFlow.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlow-${{ github.run_number }}.ipa
          path: build/ipa/*.ipa
          retention-days: 90
