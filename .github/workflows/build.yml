name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (iOS)
        run: |
          xcodebuild build \
            -scheme FreeFlowCore \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -skipPackagePluginValidation \
            | tail -20

      - name: Build (macOS)
        run: swift build

      - name: Run Tests
        run: swift test

  build-release:
    name: Build Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build Release
        run: swift build -c release
