name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (macOS debug)
        run: swift build

      - name: Build (macOS release)
        run: swift build -c release

      - name: Run Tests
        run: swift test --parallel

      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme FreeFlowCore \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -skipPackagePluginValidation \
            | xcpretty || tail -30

      - name: Build iOS Framework
        run: |
          xcodebuild archive \
            -scheme FreeFlowCore \
            -destination 'generic/platform=iOS Simulator' \
            -archivePath build/FreeFlowCore-iphonesimulator.xcarchive \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            || true

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # Copy built products
          if [ -d ".build/release" ]; then
            cp -r .build/release artifacts/release-macos
          fi
          if [ -d "build" ]; then
            cp -r build artifacts/xcarchive
          fi
          # Create build info
          echo "{\"commit\": \"$GITHUB_SHA\", \"branch\": \"$GITHUB_REF_NAME\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"swift\": \"$(swift --version 2>&1 | head -1)\"}" > artifacts/build-info.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlowCore-build-${{ github.sha }}
          path: artifacts/
          retention-days: 30
